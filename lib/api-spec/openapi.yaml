openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Jamuhuri Gachoroba Author & Podcast API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: books
    description: Book catalog and management
  - name: orders
    description: Book order management
  - name: podcasts
    description: Podcast episode management
  - name: subscribers
    description: Podcast subscriber management
  - name: messages
    description: Backend messages
  - name: pages
    description: Site page content management
  - name: blogs
    description: Blog posts management
  - name: settings
    description: Site email settings management
paths:
  /pages:
    get:
      operationId: listPages
      tags: [pages]
      summary: List all site pages
      responses:
        "200":
          description: List of pages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SitePage"

  /pages/{name}:
    get:
      operationId: getPage
      tags: [pages]
      summary: Get a site page by name
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Page content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SitePage"
        "404":
          description: Page not found
    put:
      operationId: updatePage
      tags: [pages]
      summary: Update or create a site page (admin)
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePageBody"
      responses:
        "200":
          description: Page updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SitePage"
        "201":
          description: Page created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SitePage"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /books:
    get:
      operationId: listBooks
      tags: [books]
      summary: List all books
      responses:
        "200":
          description: List of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"
    post:
      operationId: createBook
      tags: [books]
      summary: Create a new book (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookBody"
      responses:
        "201":
          description: Book created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "400":
          description: Invalid request

  /books/{id}:
    get:
      operationId: getBook
      tags: [books]
      summary: Get a single book by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Book not found
    put:
      operationId: updateBook
      tags: [books]
      summary: Update a book (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookBody"
      responses:
        "200":
          description: Book updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Book not found
    delete:
      operationId: deleteBook
      tags: [books]
      summary: Delete a book (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
        "404":
          description: Book not found

  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new book order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid request

    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders (admin)
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get a single order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Order status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid status
        "404":
          description: Order not found

  /podcasts:
    get:
      operationId: listPodcasts
      tags: [podcasts]
      summary: List all podcast episodes
      responses:
        "200":
          description: List of podcast episodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Podcast"

  /podcasts/latest:
    get:
      operationId: getLatestPodcasts
      tags: [podcasts]
      summary: Get the latest 3 podcast episodes
      responses:
        "200":
          description: Latest podcast episodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Podcast"

  /subscribers:
    post:
      operationId: createSubscriber
      tags: [subscribers]
      summary: Register a new podcast subscriber
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriberBody"
      responses:
        "201":
          description: Subscriber registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscriber"
        "409":
          description: Already subscribed

    get:
      operationId: listSubscribers
      tags: [subscribers]
      summary: List all subscribers (admin)
      responses:
        "200":
          description: Subscriber list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subscriber"

  /messages:
    post:
      operationId: createMessage
      tags: [messages]
      summary: Save a backend contact/order message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageBody"
      responses:
        "201":
          description: Message saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

    get:
      operationId: listMessages
      tags: [messages]
      summary: List all backend messages (admin)
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [books]
      summary: Get site summary stats
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"


  /blogs:
    get:
      operationId: listBlogs
      tags: [blogs]
      summary: List all published blog posts
      responses:
        "200":
          description: List of blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Blog"
    post:
      operationId: createBlog
      tags: [blogs]
      summary: Create a new blog post (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBlogBody"
      responses:
        "201":
          description: Blog post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"

  /blogs/latest:
    get:
      operationId: getLatestBlogs
      tags: [blogs]
      summary: Get latest 6 blog posts
      responses:
        "200":
          description: Latest blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Blog"

  /blogs/{id}:
    get:
      operationId: getBlog
      tags: [blogs]
      summary: Get a single blog post by ID or slug
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blog post found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
        "404":
          description: Blog post not found
    put:
      operationId: updateBlog
      tags: [blogs]
      summary: Update a blog post (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBlogBody"
      responses:
        "200":
          description: Blog post updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
    delete:
      operationId: deleteBlog
      tags: [blogs]
      summary: Delete a blog post (admin, super_admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blog post deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "404":
          description: Blog post not found

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get all site settings (admin)
      responses:
        "200":
          description: Settings object
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update site settings (super_admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/SettingsEntry"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Book:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        subtitle:
          type: string
          nullable: true
        description:
          type: string
        author:
          type: string
        coverImage:
          type: string
          nullable: true
        type:
          type: string
          enum: [hardcopy, ebook, both]
        hardcopyPrice:
          type: number
          nullable: true
        ebookPrice:
          type: number
          nullable: true
        currency:
          type: string
        isLatest:
          type: boolean
        publishedYear:
          type: integer
          nullable: true
        category:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - author
        - type
        - currency
        - isLatest
        - createdAt

    CreateBookBody:
      type: object
      properties:
        title:
          type: string
        subtitle:
          type: string
          nullable: true
        description:
          type: string
        author:
          type: string
        coverImage:
          type: string
          nullable: true
        type:
          type: string
          enum: [hardcopy, ebook, both]
        hardcopyPrice:
          type: number
          nullable: true
        ebookPrice:
          type: number
          nullable: true
        currency:
          type: string
        isLatest:
          type: boolean
        publishedYear:
          type: integer
          nullable: true
        category:
          type: string
          nullable: true
      required:
        - title
        - description
        - author
        - type
        - currency
        - isLatest

    CreateOrderBody:
      type: object
      properties:
        bookId:
          type: integer
        bookTitle:
          type: string
        orderType:
          type: string
          enum: [hardcopy, ebook]
        customerName:
          type: string
        customerEmail:
          type: string
          format: email
        customerPhone:
          type: string
          nullable: true
        deliveryAddress:
          type: string
          nullable: true
        deliveryCity:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - bookId
        - bookTitle
        - orderType
        - customerName
        - customerEmail

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [received, delivered]
        notes:
          type: string
          nullable: true
      required:
        - status

    SettingsEntry:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
      required:
        - key
        - value

    Order:
      type: object
      properties:
        id:
          type: integer
        bookId:
          type: integer
        bookTitle:
          type: string
        orderType:
          type: string
          enum: [hardcopy, ebook]
        customerName:
          type: string
        customerEmail:
          type: string
        customerPhone:
          type: string
          nullable: true
        deliveryAddress:
          type: string
          nullable: true
        deliveryCity:
          type: string
          nullable: true
        status:
          type: string
          enum: [received, delivered]
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - bookId
        - bookTitle
        - orderType
        - customerName
        - customerEmail
        - status
        - createdAt

    Podcast:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        audioUrl:
          type: string
          nullable: true
        buzzsproutUrl:
          type: string
          nullable: true
        duration:
          type: string
          nullable: true
        episodeNumber:
          type: integer
          nullable: true
        season:
          type: integer
          nullable: true
        publishedAt:
          type: string
          format: date-time
        thumbnailUrl:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - tags
        - publishedAt
        - createdAt

    CreateSubscriberBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        wantsWhatsapp:
          type: boolean
      required:
        - name
        - email
        - wantsWhatsapp

    Subscriber:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        wantsWhatsapp:
          type: boolean
        whatsappApproved:
          type: boolean
        subscribedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - wantsWhatsapp
        - whatsappApproved
        - subscribedAt

    CreateMessageBody:
      type: object
      properties:
        type:
          type: string
          enum: [order, contact, subscription]
        subject:
          type: string
        body:
          type: string
        senderEmail:
          type: string
          nullable: true
      required:
        - type
        - subject
        - body

    Message:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [order, contact, subscription]
        subject:
          type: string
        body:
          type: string
        senderEmail:
          type: string
          nullable: true
        readAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - subject
        - body
        - createdAt

    StatsSummary:
      type: object
      properties:
        totalBooks:
          type: integer
        totalOrders:
          type: integer
        totalSubscribers:
          type: integer
        totalPodcasts:
          type: integer
        totalRevenue:
          type: number
      required:
        - totalBooks
        - totalOrders
        - totalSubscribers
        - totalPodcasts

    SitePage:
      type: object
      properties:
        id:
          type: integer
        pageName:
          type: string
        pageTitle:
          type: string
        heroTitle:
          type: string
          nullable: true
        heroSubtitle:
          type: string
          nullable: true
        heroDescription:
          type: string
          nullable: true
        heroImage:
          type: string
          nullable: true
        heroButton:
          type: string
          nullable: true
        heroButtonText:
          type: string
          nullable: true
        bodyContent:
          type: string
          nullable: true
        footerContent:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        socialLinks:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - pageName
        - pageTitle
        - createdAt
        - updatedAt

    UpdatePageBody:
      type: object
      properties:
        pageName:
          type: string
        pageTitle:
          type: string
        heroTitle:
          type: string
          nullable: true
        heroSubtitle:
          type: string
          nullable: true
        heroDescription:
          type: string
          nullable: true
        heroImage:
          type: string
          nullable: true
        heroButton:
          type: string
          nullable: true
        heroButtonText:
          type: string
          nullable: true
        bodyContent:
          type: string
          nullable: true
        footerContent:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        socialLinks:
          type: string
          nullable: true
      required:
        - pageName
        - pageTitle

    Blog:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        coverImage:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        published:
          type: boolean
        publishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - title
        - slug
        - excerpt
        - content
        - published
        - publishedAt
        - createdAt

    CreateBlogBody:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        coverImage:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        published:
          type: boolean
      required:
        - title
        - slug
        - excerpt
        - content

    UpdateBlogBody:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        coverImage:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        published:
          type: boolean
